<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#000000">
    <title>COTOLAR | Panel Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        azulClaro: '#D6EAF8',
                        azulCard: '#EAF2F8',
                        azulMarino: '#154360',
                        azulSec: '#2E86C1',
                        azulPrimario: '#2980B9',
                        celeste: '#5DADE2',
                        azulBorde: '#A9CCE3',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-azulClaro">
    
    <audio id="sound-click" preload="auto" src="sounds/click.mp3"></audio>
    <audio id="sound-error" preload="auto" src="sounds/error.mp3"></audio>
    <audio id="sound-notification" preload="auto" src="sounds/notification.mp3"></audio>
    <audio id="sound-success" preload="auto" src="sounds/success.mp3"></audio>
    
    <script>
        window.playSound = function(soundName) {
            try { const audio = document.getElementById(`sound-${soundName}`); if (audio) { audio.currentTime = 0; audio.play().catch(e => console.log('Audio error:', e)); } } catch(e) { console.log(e); }
        };
    </script>
    
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-sm w-full animate-fadeIn">
            <div class="text-center mb-8">
                <div class="w-24 h-24 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg animate-pulse-slow overflow-hidden bg-white p-2">
                    <img src="icon.svg" alt="COTOLAR Logo" class="w-full h-full object-contain">
                </div>
                <h1 class="text-2xl font-bold text-azulMarino tracking-wide">COTOLAR</h1>
                <p class="text-azulSec text-sm italic tracking-wide mt-1">Terapia Ocupacional · La Rioja</p>
                <p class="text-azulSec text-xs mt-2">Panel de Gestión</p>
            </div>
            <div class="bg-azulCard rounded-2xl shadow-xl p-6 border border-azulBorde animate-slideUp">
                <div class="mb-4"><label class="block text-azulMarino font-semibold mb-2 text-sm">Email</label><input type="email" id="adminEmail" value="admin@cotolar.org" class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-white"></div>
                <div class="mb-6"><label class="block text-azulMarino font-semibold mb-2 text-sm">Contraseña</label><input type="password" id="adminPassword" value="admin123" class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-white"></div>
                <button id="btnAdminLogin" class="w-full bg-azulPrimario text-white py-3 rounded-xl font-semibold hover:bg-azulPrimario/80 transition-all duration-300 shadow-md flex items-center justify-center gap-2"><span class="material-icons text-base">login</span> Ingresar</button>
                <div class="mt-4 text-center"><a href="index.html" class="text-azulSec text-sm hover:text-azulPrimario transition">← Volver al sitio público</a></div>
                <div class="mt-6 pt-4 border-t border-azulBorde text-center text-azulSec text-xs"><p class="font-semibold text-azulMarino">Credenciales de prueba:</p><p>admin@cotolar.org / admin123</p></div>
            </div>
        </div>
    </div>
    
    <div id="adminPanel" style="display: none;">
        <header class="bg-gradient-to-r from-azulPrimario to-celeste text-white py-3 px-4 shadow-md">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg overflow-hidden bg-white flex items-center justify-center p-1"><img src="icon.svg" alt="COTOLAR Logo" class="w-full h-full object-contain"></div><span class="font-bold tracking-wide text-lg">COTOLAR Admin</span></div>
                <button id="btnLogout" class="bg-white text-azulPrimario px-4 py-1 rounded-full text-sm font-semibold hover:shadow-lg transition-all duration-300 flex items-center gap-1"><span class="material-icons text-sm">logout</span> Salir</button>
            </div>
        </header>
        
        <nav class="bg-azulCard border-b border-azulBorde sticky top-0 z-40 shadow-sm">
            <div class="max-w-6xl mx-auto px-3"><div class="flex gap-3 overflow-x-auto py-2">
                <button class="admin-tab-btn px-2 py-1 text-azulMarino font-semibold border-b-2 border-azulPrimario whitespace-nowrap text-sm" data-tab="noticias"><span class="material-icons text-sm mr-1">newspaper</span> Noticias</button>
                <button class="admin-tab-btn px-2 py-1 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm" data-tab="aranceles"><span class="material-icons text-sm mr-1">attach_money</span> Aranceles</button>
                <button class="admin-tab-btn px-2 py-1 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm" data-tab="requisitos"><span class="material-icons text-sm mr-1">checklist</span> Requisitos</button>
                <button class="admin-tab-btn px-2 py-1 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm" data-tab="capacitaciones"><span class="material-icons text-sm mr-1">school</span> Capacitaciones</button>
                <button class="admin-tab-btn px-2 py-1 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm" data-tab="profesionales"><span class="material-icons text-sm mr-1">group</span> Profesionales</button>
                <button class="admin-tab-btn px-2 py-1 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm" data-tab="autoridades"><span class="material-icons text-sm mr-1">groups</span> Autoridades</button>
                <button class="admin-tab-btn px-2 py-1 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm" data-tab="matriculados"><span class="material-icons text-sm mr-1">badge</span> Matriculados</button>
            </div></div>
        </nav>
        
        <main class="max-w-6xl mx-auto px-3 py-4 pb-20">
            <div class="bg-azulCard rounded-xl shadow-md p-4 border border-azulBorde mb-4">
                <h2 class="text-lg font-bold text-azulMarino mb-3" id="formTitle">Agregar Noticia</h2>
                <div id="formFields"></div>
                <button id="btnSave" class="bg-azulPrimario text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-azulPrimario/80 transition-all duration-300 mt-3 shadow-sm flex items-center gap-1"><span class="material-icons text-sm">save</span> Guardar</button>
            </div>
            <div class="bg-azulCard rounded-xl shadow-md p-4 border border-azulBorde">
                <h2 class="text-lg font-bold text-azulMarino mb-3">Listado</h2>
                <div id="adminList"></div>
            </div>
        </main>
    </div>
    
    <script src="js/imageHandler.js"></script>
    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').then(reg => console.log('✅ Service Worker registrado')).catch(err => console.log('❌ Error SW:', err)); }
    </script>
</body>
</html>
