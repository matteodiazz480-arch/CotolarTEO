<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#000000">
    <title>COTOLAR | Panel Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        black: '#000000',
                        white: '#FFFFFF',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white">
    
    <!-- Sonidos -->
    <audio id="sound-click" preload="auto" src="sounds/click.mp3"></audio>
    <audio id="sound-error" preload="auto" src="sounds/error.mp3"></audio>
    <audio id="sound-notification" preload="auto" src="sounds/notification.mp3"></audio>
    <audio id="sound-success" preload="auto" src="sounds/success.mp3"></audio>
    
    <script>
        window.playSound = function(soundName) {
            try {
                const audio = document.getElementById(`sound-${soundName}`);
                if (audio) {
                    audio.currentTime = 0;
                    audio.play().catch(e => console.log('Audio error:', e));
                }
            } catch(e) { console.log(e); }
        };
    </script>
    
    <!-- Pantalla de Login -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-sm w-full animate-fadeIn">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-black rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse-slow">
                    <i class="fas fa-hand-holding-heart text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-black">COTOLAR</h1>
                <p class="text-black/50 text-sm mt-1">Panel de Gestión</p>
            </div>
            
            <div class="border border-black p-6 bg-white animate-slideUp">
                <div class="mb-4">
                    <label class="block text-black font-semibold mb-2 text-sm">Email</label>
                    <input type="email" id="adminEmail" value="admin@cotolar.org" 
                           class="w-full px-4 py-3 border border-black focus:outline-none focus:ring-1 focus:ring-black bg-white">
                </div>
                <div class="mb-6">
                    <label class="block text-black font-semibold mb-2 text-sm">Contraseña</label>
                    <input type="password" id="adminPassword" value="admin123" 
                           class="w-full px-4 py-3 border border-black focus:outline-none focus:ring-1 focus:ring-black bg-white">
                </div>
                <button id="btnAdminLogin" class="w-full bg-black text-white py-3 font-semibold hover:bg-black/80 transition-all duration-300">
                    <i class="fas fa-sign-in-alt mr-2"></i> Ingresar
                </button>
                <div class="mt-4 text-center">
                    <a href="index.html" class="text-black/50 text-sm hover:text-black transition">
                        ← Volver al sitio público
                    </a>
                </div>
                <div class="mt-6 pt-4 border-t border-black/20 text-center text-black/40 text-xs">
                    <p>admin@cotolar.org / admin123</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Panel Admin (oculto hasta login) -->
    <div id="adminPanel" style="display: none;">
        <header class="bg-black text-white py-3 px-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-hand-holding-heart text-xl"></i>
                    <span class="font-bold">COTOLAR Admin</span>
                </div>
                <button id="btnLogout" class="border border-white px-4 py-1 text-sm hover:bg-white hover:text-black transition-all duration-300">
                    <i class="fas fa-sign-out-alt mr-1"></i> Salir
                </button>
            </div>
        </header>
        
        <nav class="bg-white border-b border-black sticky top-0 z-40">
            <div class="max-w-6xl mx-auto px-4">
                <div class="flex gap-4 overflow-x-auto py-3">
                    <button class="admin-tab-btn px-3 py-2 text-black font-semibold border-b-2 border-black whitespace-nowrap" data-tab="noticias">Noticias</button>
                    <button class="admin-tab-btn px-3 py-2 text-black/50 font-semibold border-b-2 border-transparent hover:border-black whitespace-nowrap" data-tab="aranceles">Aranceles</button>
                    <button class="admin-tab-btn px-3 py-2 text-black/50 font-semibold border-b-2 border-transparent hover:border-black whitespace-nowrap" data-tab="requisitos">Requisitos</button>
                    <button class="admin-tab-btn px-3 py-2 text-black/50 font-semibold border-b-2 border-transparent hover:border-black whitespace-nowrap" data-tab="capacitaciones">Capacitaciones</button>
                </div>
            </div>
        </nav>
        
        <main class="max-w-6xl mx-auto px-4 py-8 pb-24">
            <div class="border border-black p-6 mb-6">
                <h2 class="text-xl font-bold text-black mb-4" id="formTitle">Agregar Noticia</h2>
                <div id="formFields"></div>
                <button id="btnSave" class="bg-black text-white px-6 py-2 font-semibold hover:bg-black/80 transition-all duration-300 mt-3">
                    <i class="fas fa-save mr-2"></i> Guardar
                </button>
            </div>
            
            <div class="border border-black p-6">
                <h2 class="text-xl font-bold text-black mb-4">Listado</h2>
                <div id="adminList"></div>
            </div>
        </main>
    </div>
    
    <script src="data.js"></script>
    <script src="admin.js"></script>
    
    <!-- Service Worker para PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('✅ Service Worker registrado'))
                .catch(err => console.log('❌ Error SW:', err));
        }
    </script>
</body>
</html>
