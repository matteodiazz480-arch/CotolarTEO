<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#000000">
    <title>COTOLAR | Panel Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        beige: '#FAF7F2',
                        marron: '#2C1810',
                        marronClaro: '#8B6B5A',
                        terracota: '#D46A4A',
                        oliva: '#6B7B5E',
                        mostaza: '#D4A843',
                        arena: '#E8DDD0',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-beige">
    
    <audio id="sound-click" preload="auto" src="sounds/click.mp3"></audio>
    <audio id="sound-error" preload="auto" src="sounds/error.mp3"></audio>
    <audio id="sound-notification" preload="auto" src="sounds/notification.mp3"></audio>
    <audio id="sound-success" preload="auto" src="sounds/success.mp3"></audio>
    
    <script>
        window.playSound = function(soundName) {
            try { const audio = document.getElementById(`sound-${soundName}`); if (audio) { audio.currentTime = 0; audio.play().catch(e => console.log('Audio error:', e)); } } catch(e) { console.log(e); }
        };
    </script>
    
    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-sm w-full animate-fadeIn">
            <div class="text-center mb-6">
                <div class="w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg animate-pulse-slow overflow-hidden bg-white p-2">
                    <img src="icon.svg" alt="COTOLAR Logo" class="w-full h-full object-contain">
                </div>
                <h1 class="text-2xl font-bold text-marron tracking-wide">COTOLAR</h1>
                <p class="text-marronClaro text-sm italic mt-1">Panel de Gestión</p>
            </div>
            <div class="bg-white rounded-2xl shadow-xl p-5 border border-arena animate-slideUp">
                <div class="mb-3"><label class="block text-marron font-semibold mb-1 text-sm">Email</label><input type="email" id="adminEmail" value="admin@cotolar.org" class="w-full px-4 py-2 border border-arena rounded-xl focus:outline-none focus:ring-2 focus:ring-terracota bg-beige"></div>
                <div class="mb-4"><label class="block text-marron font-semibold mb-1 text-sm">Contraseña</label><input type="password" id="adminPassword" value="admin123" class="w-full px-4 py-2 border border-arena rounded-xl focus:outline-none focus:ring-2 focus:ring-terracota bg-beige"></div>
                <button id="btnAdminLogin" class="w-full bg-terracota text-white py-2 rounded-xl font-semibold hover:bg-terracota/80 transition-all duration-300 shadow-md flex items-center justify-center gap-1"><span class="material-icons text-sm">login</span> Ingresar</button>
                <div class="mt-3 text-center"><a href="index.html" class="text-marronClaro text-xs hover:text-terracota transition">← Volver al sitio público</a></div>
                <div class="mt-4 pt-3 border-t border-arena text-center text-marronClaro text-xs"><p class="font-semibold text-marron text-xs">Credenciales:</p><p>admin@cotolar.org / admin123</p></div>
            </div>
        </div>
    </div>
    
    <!-- Admin Panel -->
    <div id="adminPanel" style="display: none;">
        <header class="bg-gradient-to-r from-terracota to-oliva text-white py-2 px-4 shadow-md">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2"><div class="w-8 h-8 rounded-lg overflow-hidden bg-white flex items-center justify-center p-1"><img src="icon.svg" alt="Logo" class="w-full h-full object-contain"></div><span class="font-bold tracking-wide">COTOLAR Admin</span></div>
                <button id="btnLogout" class="bg-white text-terracota px-3 py-1 rounded-full text-xs font-semibold hover:shadow-lg transition-all duration-300 flex items-center gap-1"><span class="material-icons text-sm">logout</span> Salir</button>
            </div>
        </header>
        
        <nav class="bg-white border-b border-arena sticky top-0 z-40 shadow-sm">
            <div class="max-w-6xl mx-auto px-3"><div class="flex gap-3 overflow-x-auto py-2">
                <button class="admin-tab-btn px-2 py-1 text-marron font-semibold border-b-2 border-terracota whitespace-nowrap text-sm" data-tab="noticias"><span class="material-icons text-sm mr-1">newspaper</span> Noticias</button>
                <button class="admin-tab-btn px-2 py-1 text-marronClaro font-semibold border-b-2 border-transparent hover:border-terracota whitespace-nowrap text-sm" data-tab="aranceles"><span class="material-icons text-sm mr-1">attach_money</span> Aranceles</button>
                <button class="admin-tab-btn px-2 py-1 text-marronClaro font-semibold border-b-2 border-transparent hover:border-terracota whitespace-nowrap text-sm" data-tab="requisitos"><span class="material-icons text-sm mr-1">checklist</span> Requisitos</button>
                <button class="admin-tab-btn px-2 py-1 text-marronClaro font-semibold border-b-2 border-transparent hover:border-terracota whitespace-nowrap text-sm" data-tab="capacitaciones"><span class="material-icons text-sm mr-1">school</span> Capacitaciones</button>
                <button class="admin-tab-btn px-2 py-1 text-marronClaro font-semibold border-b-2 border-transparent hover:border-terracota whitespace-nowrap text-sm" data-tab="profesionales"><span class="material-icons text-sm mr-1">group</span> Profesionales</button>
                <button class="admin-tab-btn px-2 py-1 text-marronClaro font-semibold border-b-2 border-transparent hover:border-terracota whitespace-nowrap text-sm" data-tab="autoridades"><span class="material-icons text-sm mr-1">groups</span> Autoridades</button>
            </div></div>
        </nav>
        
        <main class="max-w-6xl mx-auto px-3 py-4 pb-20">
            <div class="bg-white rounded-xl shadow-md p-4 border border-arena mb-4">
                <h2 class="text-lg font-bold text-marron mb-3" id="formTitle">Agregar Noticia</h2>
                <div id="formFields"></div>
                <button id="btnSave" class="bg-terracota text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-terracota/80 transition-all duration-300 mt-3 shadow-sm flex items-center gap-1"><span class="material-icons text-sm">save</span> Guardar</button>
            </div>
            <div class="bg-white rounded-xl shadow-md p-4 border border-arena">
                <h2 class="text-lg font-bold text-marron mb-3">Listado</h2>
                <div id="adminList"></div>
            </div>
        </main>
    </div>
    
    <script src="js/imageHandler.js"></script>
    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').then(reg => console.log('✅ Service Worker registrado')).catch(err => console.log('❌ Error SW:', err)); }
    </script>
</body>
</html>
