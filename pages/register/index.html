<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2980B9">
    <title>COTOLAR | Registrarse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="manifest" href="/manifest.json">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        azulClaro: '#D6EAF8', azulCard: '#EAF2F8', azulMarino: '#154360',
                        azulSec: '#2E86C1', azulPrimario: '#2980B9', celeste: '#5DADE2', azulBorde: '#A9CCE3'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-8"
    style="background: linear-gradient(135deg, #1a5d8a 0%, #2980B9 55%, #5DADE2 100%);">

    <div class="w-full max-w-lg">

        <!-- Logo -->
        <div class="text-center mb-6">
            <a href="/pages/home/">
                <div class="w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-2xl overflow-hidden bg-white p-2">
                    <img src="/assets/icons/icon.svg" alt="COTOLAR" class="w-full h-full object-contain">
                </div>
                <h1 class="text-2xl font-bold text-white tracking-wide">COTOLAR</h1>
                <p class="text-white/70 text-xs mt-1">Colegio de Terapia Ocupacional de La Rioja</p>
            </a>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

            <!-- Tabs -->
            <div class="flex border-b border-azulBorde">
                <button class="flex-1 py-4 text-azulSec font-semibold text-sm border-b-2 border-transparent hover:text-azulPrimario transition"
                    onclick="window.location.href='/pages/login/'">
                    Iniciar sesión
                </button>
                <button class="flex-1 py-4 text-azulPrimario font-bold text-sm border-b-2 border-azulPrimario">
                    Registrarse
                </button>
            </div>

            <div class="p-6 md:p-8">
                <p class="text-azulSec text-sm mb-5">Completá el formulario para crear tu cuenta profesional.</p>

                <div id="regError" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm flex items-center gap-2">
                    <span class="material-icons text-base flex-shrink-0">error_outline</span>
                    <span id="regErrorMsg"></span>
                </div>
                <div id="regSuccess" class="hidden mb-4 bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 text-sm flex items-center gap-2">
                    <span class="material-icons text-base flex-shrink-0">check_circle</span>
                    <span>Registro exitoso. Redirigiendo a tu panel...</span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                    <!-- Nombre -->
                    <div class="md:col-span-2">
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">
                            Nombre completo <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="regNombre" placeholder="Ej: María López"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-azulClaro/20">
                    </div>

                    <!-- DNI -->
                    <div>
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">
                            DNI <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="regDni" placeholder="Sin puntos" maxlength="8" inputmode="numeric"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-azulClaro/20">
                    </div>

                    <!-- Teléfono -->
                    <div>
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">
                            Teléfono <span class="text-red-500">*</span>
                        </label>
                        <input type="tel" id="regTelefono" placeholder="Ej: 3804123456"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-azulClaro/20">
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">
                            Correo electrónico <span class="text-red-500">*</span>
                        </label>
                        <input type="email" id="regEmail" placeholder="correo@ejemplo.com" autocomplete="email"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-azulClaro/20">
                    </div>

                    <!-- Fecha de nacimiento -->
                    <div>
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">
                            Fecha de nacimiento <span class="text-red-500">*</span>
                        </label>
                        <input type="date" id="regFechaNac"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-azulClaro/20">
                    </div>

                    <!-- Localidad -->
                    <div class="md:col-span-2">
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">
                            Localidad / Ubicación <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="regLocalidad" placeholder="Ej: La Rioja Capital"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-azulClaro/20">
                    </div>

                    <!-- Contraseña -->
                    <div>
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">
                            Contraseña <span class="text-red-500">*</span>
                        </label>
                        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-azulClaro/20">
                    </div>

                    <!-- Confirmar contraseña -->
                    <div>
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">
                            Confirmar contraseña <span class="text-red-500">*</span>
                        </label>
                        <input type="password" id="regPasswordConfirm" placeholder="Repetí la contraseña" autocomplete="new-password"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-azulClaro/20">
                    </div>

                </div>

                <button id="btnRegister"
                    class="w-full mt-6 bg-azulPrimario text-white py-3 rounded-xl font-bold hover:bg-azulPrimario/80 transition-all duration-300 shadow-md flex items-center justify-center gap-2">
                    <span class="material-icons">person_add</span> Crear cuenta
                </button>

                <div class="mt-4 text-center">
                    <a href="/pages/login/" class="inline-flex items-center gap-1 text-azulSec text-sm hover:text-azulPrimario transition">
                        <span class="material-icons text-base">arrow_back</span> Ya tengo cuenta
                    </a>
                </div>
            </div>
        </div>

        <p class="text-white/40 text-xs text-center mt-6">© 2025 COTOLAR · Órgano oficial de regulación profesional</p>
    </div>

    <script src="/assets/js/db.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>
        (function () {
            const s = Auth.getSession();
            if (s) Auth.redirectByRole(s);
        })();

        function showError(msg) {
            document.getElementById('regErrorMsg').textContent = msg;
            document.getElementById('regError').classList.remove('hidden');
            document.getElementById('regSuccess').classList.add('hidden');
        }

        document.getElementById('btnRegister').addEventListener('click', doRegister);

        function doRegister() {
            const nombre = document.getElementById('regNombre').value.trim();
            const dni = document.getElementById('regDni').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const telefono = document.getElementById('regTelefono').value.trim();
            const fechaNacimiento = document.getElementById('regFechaNac').value;
            const localidad = document.getElementById('regLocalidad').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;

            document.getElementById('regError').classList.add('hidden');

            if (!nombre || !dni || !email || !telefono || !fechaNacimiento || !localidad || !password || !passwordConfirm) {
                showError('Completá todos los campos obligatorios.'); return;
            }
            if (!/^\d{7,8}$/.test(dni)) {
                showError('El DNI debe tener 7 u 8 dígitos numéricos.'); return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('El correo electrónico no es válido.'); return;
            }
            if (password.length < 6) {
                showError('La contraseña debe tener al menos 6 caracteres.'); return;
            }
            if (password !== passwordConfirm) {
                showError('Las contraseñas no coinciden.'); return;
            }

            const btn = document.getElementById('btnRegister');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-icons text-sm" style="animation:spin 1s linear infinite">refresh</span>&nbsp;Registrando...';

            setTimeout(() => {
                const result = DB.registrar({ nombre, dni, email, telefono, fechaNacimiento, localidad, password });
                if (!result.ok) {
                    showError(result.msg);
                    btn.disabled = false;
                    btn.innerHTML = '<span class="material-icons">person_add</span> Crear cuenta';
                    return;
                }
                document.getElementById('regSuccess').classList.remove('hidden');
                Auth.setSession(result.user);
                setTimeout(() => Auth.redirectByRole(result.user), 1500);
            }, 500);
        }
    </script>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
