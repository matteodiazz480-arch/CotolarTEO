<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2980B9">
    <title>COTOLAR | Panel Docente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/teacher.css">
    <link rel="manifest" href="/manifest.json">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        azulClaro: '#D6EAF8', azulCard: '#EAF2F8', azulMarino: '#154360',
                        azulSec: '#2E86C1', azulPrimario: '#2980B9', celeste: '#5DADE2', azulBorde: '#A9CCE3'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-azulClaro min-h-screen">

    <!-- Header -->
    <header class="bg-gradient-to-r from-azulPrimario to-celeste text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl overflow-hidden bg-white flex items-center justify-center p-1">
                    <img src="/assets/icons/icon.svg" alt="COTOLAR" class="w-full h-full object-contain">
                </div>
                <div>
                    <p class="font-bold text-base leading-tight">COTOLAR</p>
                    <p class="text-white/70 text-xs">Panel Docente</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span id="headerNombre" class="text-sm text-white/90 hidden sm:inline"></span>
                <button id="btnLogout"
                    class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1 transition">
                    <span class="material-icons text-sm">logout</span>
                    <span class="hidden sm:inline">Salir</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Tabs de navegación -->
    <nav class="bg-azulCard border-b border-azulBorde shadow-sm">
        <div class="max-w-5xl mx-auto px-4">
            <div class="flex gap-1 py-2 overflow-x-auto">
                <button class="teacher-tab px-4 py-2 text-sm font-semibold rounded-lg flex items-center gap-1 whitespace-nowrap transition" data-tab="perfil">
                    <span class="material-icons text-sm">person</span> Mi Perfil
                </button>
                <button class="teacher-tab px-4 py-2 text-sm font-semibold rounded-lg flex items-center gap-1 whitespace-nowrap transition" data-tab="datos">
                    <span class="material-icons text-sm">edit</span> Editar Datos
                </button>
                <button class="teacher-tab px-4 py-2 text-sm font-semibold rounded-lg flex items-center gap-1 whitespace-nowrap transition" data-tab="pagos">
                    <span class="material-icons text-sm">payments</span> Mis Pagos
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-6 pb-24">

        <!-- TAB: Mi Perfil -->
        <div id="tab-perfil" class="teacher-content animate-fadeIn">
            <div class="grid md:grid-cols-3 gap-6">

                <!-- Foto + datos básicos -->
                <div class="md:col-span-1">
                    <div class="bg-azulCard rounded-2xl shadow-md border border-azulBorde p-6 text-center">
                        <div class="photo-wrapper">
                            <img id="profilePhoto" src="/assets/icons/icon.svg" alt="Foto de perfil">
                            <button id="btnDeletePhoto" class="photo-action-btn delete hidden" title="Eliminar foto">
                                <span class="material-icons text-sm">delete</span>
                            </button>
                            <button id="btnChangePhoto" class="photo-action-btn change" title="Cambiar foto">
                                <span class="material-icons text-sm">photo_camera</span>
                            </button>
                        </div>
                        <input type="file" id="photoInput" accept="image/*" class="hidden">

                        <h2 id="perfilNombre" class="text-xl font-bold text-azulMarino mt-2"></h2>
                        <p id="perfilEspecialidad" class="text-azulSec text-sm mt-1"></p>

                        <div id="perfilMatricula" class="mt-3 bg-azulPrimario/10 rounded-lg px-3 py-1.5 inline-flex items-center gap-1">
                            <span class="material-icons text-azulPrimario text-sm">badge</span>
                            <span class="text-azulPrimario text-sm font-semibold"></span>
                        </div>

                        <div id="estadoPagoChip" class="mt-2 rounded-full px-4 py-1 text-sm font-semibold inline-block"></div>

                        <div class="mt-4 pt-4 border-t border-azulBorde">
                            <a href="/pages/home/" class="text-azulSec text-sm hover:text-azulPrimario transition flex items-center justify-center gap-1">
                                <span class="material-icons text-sm">home</span> Ir al inicio
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Datos detallados -->
                <div class="md:col-span-2 space-y-4">
                    <div class="bg-azulCard rounded-2xl shadow-md border border-azulBorde p-6">
                        <h3 class="font-bold text-azulMarino text-lg mb-4 flex items-center gap-2">
                            <span class="material-icons text-azulPrimario">badge</span> Datos Personales
                        </h3>
                        <div class="grid grid-cols-2 gap-4" id="datosPersonalesList"></div>
                    </div>

                    <div class="bg-azulCard rounded-2xl shadow-md border border-azulBorde p-6">
                        <h3 class="font-bold text-azulMarino text-lg mb-4 flex items-center gap-2">
                            <span class="material-icons text-azulPrimario">contact_mail</span> Datos de Contacto
                        </h3>
                        <div class="grid grid-cols-2 gap-4" id="datosContactoList"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB: Editar Datos -->
        <div id="tab-datos" class="teacher-content hidden animate-fadeIn">
            <div class="bg-azulCard rounded-2xl shadow-md border border-azulBorde p-6 max-w-2xl">
                <h2 class="text-xl font-bold text-azulMarino mb-6 flex items-center gap-2">
                    <span class="material-icons text-azulPrimario">edit</span> Editar mis datos
                </h2>

                <div id="editAlert" class="hidden mb-4 rounded-xl px-4 py-3 text-sm font-medium"></div>

                <div class="grid md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">Nombre completo</label>
                        <input type="text" id="editNombre"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-white">
                    </div>
                    <div>
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">Teléfono</label>
                        <input type="tel" id="editTelefono"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-white">
                    </div>
                    <div>
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">Localidad</label>
                        <input type="text" id="editLocalidad"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-white">
                    </div>
                    <div>
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">Especialidad</label>
                        <input type="text" id="editEspecialidad"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-white">
                    </div>
                    <div>
                        <label class="block text-azulMarino font-semibold mb-1 text-sm">Fecha de nacimiento</label>
                        <input type="date" id="editFechaNac"
                            class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-white">
                    </div>
                </div>

                <div class="mt-5 pt-5 border-t border-azulBorde">
                    <p class="text-azulMarino font-semibold text-sm mb-3 flex items-center gap-1">
                        <span class="material-icons text-sm text-azulSec">lock</span> Cambiar contraseña (opcional)
                    </p>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-azulMarino font-semibold mb-1 text-sm">Nueva contraseña</label>
                            <input type="password" id="editPassword" placeholder="Dejá vacío para no cambiar"
                                class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-white">
                        </div>
                        <div>
                            <label class="block text-azulMarino font-semibold mb-1 text-sm">Confirmar contraseña</label>
                            <input type="password" id="editPasswordConfirm" placeholder="Repetí la contraseña"
                                class="w-full px-4 py-3 border border-azulBorde rounded-xl focus:outline-none focus:ring-2 focus:ring-azulPrimario bg-white">
                        </div>
                    </div>
                </div>

                <button id="btnGuardar"
                    class="mt-6 bg-azulPrimario text-white px-6 py-3 rounded-xl font-bold hover:bg-azulPrimario/80 transition-all flex items-center gap-2 shadow-md">
                    <span class="material-icons">save</span> Guardar cambios
                </button>
            </div>
        </div>

        <!-- TAB: Mis Pagos -->
        <div id="tab-pagos" class="teacher-content hidden animate-fadeIn space-y-4">

            <!-- Estado actual + botón de pago -->
            <div id="estadoCuotaCard" class="bg-azulCard rounded-2xl shadow-md border border-azulBorde p-6">
                <p class="text-azulSec text-center py-4">Cargando estado...</p>
            </div>

            <!-- Historial de pagos -->
            <div class="bg-azulCard rounded-2xl shadow-md border border-azulBorde p-6">
                <h3 class="font-bold text-azulMarino text-lg mb-4 flex items-center gap-2">
                    <span class="material-icons text-azulPrimario">history</span> Historial de pagos
                </h3>
                <div id="pagosContainer" class="space-y-3">
                    <p class="text-azulSec text-center py-4">Cargando historial...</p>
                </div>
            </div>

        </div>

    </main>

    <audio id="sound-click" preload="auto" src="/assets/sounds/click.mp3"></audio>
    <audio id="sound-success" preload="auto" src="/assets/sounds/success.mp3"></audio>
    <audio id="sound-error" preload="auto" src="/assets/sounds/error.mp3"></audio>

    <script src="/assets/js/db.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/teacher.js"></script>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
    </script>
</body>
</html>
