<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#2980B9">
    <title>COTOLAR | Panel Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
    <link rel="manifest" href="/manifest.json">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        azulClaro: '#D6EAF8', azulCard: '#EAF2F8', azulMarino: '#154360',
                        azulSec: '#2E86C1', azulPrimario: '#2980B9', celeste: '#5DADE2', azulBorde: '#A9CCE3'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-azulClaro">

    <audio id="sound-click" preload="auto" src="/assets/sounds/click.mp3"></audio>
    <audio id="sound-error" preload="auto" src="/assets/sounds/error.mp3"></audio>
    <audio id="sound-notification" preload="auto" src="/assets/sounds/notification.mp3"></audio>
    <audio id="sound-success" preload="auto" src="/assets/sounds/success.mp3"></audio>

    <script>
        window.playSound = function (soundName) {
            try {
                const audio = document.getElementById(`sound-${soundName}`);
                if (audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
            } catch (e) {}
        };
    </script>

    <!-- Admin Panel -->
    <div id="adminPanel">

        <!-- Header -->
        <header class="bg-gradient-to-r from-azulPrimario to-celeste text-white shadow-md sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-lg overflow-hidden bg-white flex items-center justify-center p-1">
                        <img src="/assets/icons/icon.svg" alt="Logo" class="w-full h-full object-contain">
                    </div>
                    <div>
                        <span class="font-bold tracking-wide text-lg hidden sm:inline">COTOLAR Admin</span>
                        <p class="text-white/70 text-xs hidden sm:block">Panel de Administración</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span id="adminNameDisplay" class="text-sm hidden sm:inline text-white/90">Administrador</span>
                    <button id="menuAdminBtn" class="md:hidden bg-white/20 p-2 rounded-full">
                        <span class="material-icons">menu</span>
                    </button>
                    <a href="/pages/home/" class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full text-sm font-semibold flex items-center gap-1 transition">
                        <span class="material-icons text-sm">home</span>
                        <span class="hidden sm:inline">Inicio</span>
                    </a>
                    <button id="btnLogout" class="bg-white text-azulPrimario px-4 py-1.5 rounded-full text-sm font-semibold hover:shadow-lg transition-all duration-300 flex items-center gap-1">
                        <span class="material-icons text-sm">logout</span>
                        <span class="hidden sm:inline">Salir</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Menú lateral móvil -->
        <div id="adminMobileMenu" class="fixed inset-0 z-[150] bg-black/50 backdrop-blur-sm hidden transition-all duration-300">
            <div class="bg-azulCard w-80 h-full shadow-2xl p-6 animate-slideInLeft border-r border-azulBorde">
                <div class="flex justify-between items-center mb-8 pb-4 border-b border-azulBorde">
                    <span class="font-bold text-azulMarino text-xl">Menú Admin</span>
                    <button id="closeAdminMenuBtn" class="text-azulPrimario p-1"><span class="material-icons">close</span></button>
                </div>
                <nav class="flex flex-col gap-2">
                    <button class="admin-mobile-tab-btn flex items-center gap-3 p-3 rounded-xl hover:bg-azulClaro transition-colors w-full text-left" data-tab="dashboard"><span class="material-icons text-azulPrimario">dashboard</span><span class="text-azulMarino">Dashboard</span></button>
                    <button class="admin-mobile-tab-btn flex items-center gap-3 p-3 rounded-xl hover:bg-azulClaro transition-colors w-full text-left" data-tab="noticias"><span class="material-icons text-azulPrimario">newspaper</span><span class="text-azulMarino">Noticias</span></button>
                    <button class="admin-mobile-tab-btn flex items-center gap-3 p-3 rounded-xl hover:bg-azulClaro transition-colors w-full text-left" data-tab="aranceles"><span class="material-icons text-azulPrimario">attach_money</span><span class="text-azulMarino">Aranceles</span></button>
                    <button class="admin-mobile-tab-btn flex items-center gap-3 p-3 rounded-xl hover:bg-azulClaro transition-colors w-full text-left" data-tab="requisitos"><span class="material-icons text-azulPrimario">checklist</span><span class="text-azulMarino">Requisitos</span></button>
                    <button class="admin-mobile-tab-btn flex items-center gap-3 p-3 rounded-xl hover:bg-azulClaro transition-colors w-full text-left" data-tab="capacitaciones"><span class="material-icons text-azulPrimario">school</span><span class="text-azulMarino">Capacitaciones</span></button>
                    <button class="admin-mobile-tab-btn flex items-center gap-3 p-3 rounded-xl hover:bg-azulClaro transition-colors w-full text-left" data-tab="profesionales"><span class="material-icons text-azulPrimario">group</span><span class="text-azulMarino">Profesionales</span></button>
                    <button class="admin-mobile-tab-btn flex items-center gap-3 p-3 rounded-xl hover:bg-azulClaro transition-colors w-full text-left" data-tab="autoridades"><span class="material-icons text-azulPrimario">groups</span><span class="text-azulMarino">Autoridades</span></button>
                    <button class="admin-mobile-tab-btn flex items-center gap-3 p-3 rounded-xl hover:bg-azulClaro transition-colors w-full text-left" data-tab="matriculados"><span class="material-icons text-azulPrimario">badge</span><span class="text-azulMarino">Matriculados</span></button>
                </nav>
            </div>
        </div>

        <!-- Navegación escritorio -->
        <nav class="hidden md:block bg-azulCard border-b border-azulBorde sticky top-[61px] z-40 shadow-sm overflow-x-auto">
            <div class="max-w-7xl mx-auto px-4">
                <div class="flex gap-1 py-2">
                    <button class="admin-tab-btn px-3 py-2 text-azulMarino font-semibold border-b-2 border-azulPrimario whitespace-nowrap text-sm flex items-center gap-1" data-tab="dashboard"><span class="material-icons text-sm">dashboard</span> Dashboard</button>
                    <button class="admin-tab-btn px-3 py-2 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm flex items-center gap-1" data-tab="noticias"><span class="material-icons text-sm">newspaper</span> Noticias</button>
                    <button class="admin-tab-btn px-3 py-2 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm flex items-center gap-1" data-tab="aranceles"><span class="material-icons text-sm">attach_money</span> Aranceles</button>
                    <button class="admin-tab-btn px-3 py-2 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm flex items-center gap-1" data-tab="requisitos"><span class="material-icons text-sm">checklist</span> Requisitos</button>
                    <button class="admin-tab-btn px-3 py-2 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm flex items-center gap-1" data-tab="capacitaciones"><span class="material-icons text-sm">school</span> Capacitaciones</button>
                    <button class="admin-tab-btn px-3 py-2 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm flex items-center gap-1" data-tab="profesionales"><span class="material-icons text-sm">group</span> Profesionales</button>
                    <button class="admin-tab-btn px-3 py-2 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm flex items-center gap-1" data-tab="autoridades"><span class="material-icons text-sm">groups</span> Autoridades</button>
                    <button class="admin-tab-btn px-3 py-2 text-azulSec font-semibold border-b-2 border-transparent hover:border-azulPrimario whitespace-nowrap text-sm flex items-center gap-1" data-tab="matriculados"><span class="material-icons text-sm">badge</span> Matriculados</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 py-6 pb-24">
            <div id="tab-dashboard" class="admin-tab-content">
                <div id="dashboardContainer" class="space-y-6"></div>
            </div>
            <div id="tab-form-list" style="display: none;">
                <div class="bg-azulCard rounded-xl shadow-md p-4 border border-azulBorde mb-4">
                    <h2 class="text-lg font-bold text-azulMarino mb-3" id="formTitle">Agregar</h2>
                    <div id="formFields"></div>
                    <button id="btnSave" class="bg-azulPrimario text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-azulPrimario/80 transition-all duration-300 mt-3 shadow-sm flex items-center gap-1">
                        <span class="material-icons text-sm">save</span> Guardar
                    </button>
                </div>
                <div class="bg-azulCard rounded-xl shadow-md p-4 border border-azulBorde">
                    <h2 class="text-lg font-bold text-azulMarino mb-3">Listado</h2>
                    <div id="adminList"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="/assets/js/db.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/imageHandler.js"></script>
    <script src="/assets/js/data.js"></script>
    <script src="/assets/js/admin.js"></script>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
    </script>
</body>
</html>
