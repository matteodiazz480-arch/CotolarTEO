<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D46A4A" />
      <stop offset="100%" style="stop-color:#6B7B5E" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="150" cy="100" r="90" fill="url(#grad)"/>
  
  <!-- Anillo decorativo -->
  <circle cx="150" cy="100" r="80" fill="none" stroke="#D4A843" stroke-width="2"/>
  
  <!-- COTOLAR -->
  <text x="150" y="85" text-anchor="middle" font-family="'Times New Roman', Georgia, serif" font-weight="bold" font-size="28" fill="#FFFFFF" letter-spacing="6">
    COTOLAR
  </text>
  
  <!-- LA RIOJA -->
  <text x="150" y="118" text-anchor="middle" font-family="'Times New Roman', Georgia, serif" font-weight="normal" font-size="16" fill="#D4A843" letter-spacing="4">
    LA RIOJA
  </text>
  
  <!-- Línea decorativa -->
  <line x1="80" y1="135" x2="220" y2="135" stroke="#D4A843" stroke-width="1"/>
  
  <!-- Texto inferior -->
  <text x="150" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="#FFFFFF" letter-spacing="2" opacity="0.7">
    TERAPIA OCUPACIONAL
  </text>
</svg>